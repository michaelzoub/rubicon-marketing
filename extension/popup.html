<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rubicon</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="aurora" aria-hidden="true"></div>
    <main>
      <header>
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="95 825 1745 340">
            <image href="rubicon-new.png" width="2000" height="2000" />
          </svg>
        </span>
        <span id="conn-pill" class="conn-pill" data-state="off">
          <span class="conn-dot" aria-hidden="true"></span>
          <span id="conn-text">Not connected</span>
        </span>
      </header>

      <section id="page-card" class="card">
        <span id="platform" class="eyebrow">Checking page&hellip;</span>
        <h1 id="title">Current page</h1>
        <p id="author" class="author"></p>
      </section>

      <section id="connect" class="card hidden">
        <div class="card-heading">
          <span class="eyebrow">Set up &mdash; one time</span>
          <h2>Connect your Rubicon account</h2>
        </div>

        <div class="step">
          <span class="step-num">1</span>
          <div class="step-body">
            <p class="step-text">Open Rubicon and copy your extension token.</p>
            <button id="open-settings" class="secondary setup-link">
              <span>Open Rubicon settings</span>
              <svg class="arrow" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </button>
          </div>
        </div>

        <div class="step">
          <span class="step-num">2</span>
          <div class="step-body">
            <label for="token" class="step-text">Paste the token here.</label>
            <input id="token" type="password" placeholder="rbx_&hellip;" autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <details>
          <summary>Local development</summary>
          <div class="field advanced-field">
            <label for="origin">Rubicon app URL</label>
            <input id="origin" type="url" value="https://www.rubiconpay.xyz" spellcheck="false" />
          </div>
        </details>

        <button id="save" class="primary">
          <span>Save &amp; connect</span>
          <svg class="arrow" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
        </button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <button id="send" class="primary" disabled>
        <span class="button-label">Send to Rubicon</span>
        <svg class="arrow" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" /></svg>
      </button>
      <button id="change-token" class="link hidden">Change connection</button>
      <p class="footnote">Creates a draft for review. Nothing is published automatically.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
